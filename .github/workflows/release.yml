name: Release
on:
    push:
        branches:
            - "main"
    workflow_dispatch:

jobs:
    publish_windows:
        name: "Publish Windows"
        runs-on: blacksmith-4vcpu-windows-2025

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Install Node.js and NPM
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              # npm ci is better, but requires package-lock.json file
              run: npm install

            - name: Build app
              run: npm run build

            - name: Build and release app
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
              run: |
                  if [ -n "${AZURE_TENANT_ID}" ] && [ -n "${AZURE_CLIENT_ID}" ] && [ -n "${AZURE_CLIENT_SECRET}" ]; then
                    npm run release
                  else
                    npm run release:internal
                  fi
              shell: bash

    publish_mac:
        name: "Publish MacOS"
        runs-on: macos-latest
        needs: publish_windows

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Install Node.js and NPM
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            # Change Python version: https://github.com/nodejs/node-gyp/issues/2869
            - name: Install Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            # This probably does not make any difference.
            - name: Install node-gyp
              run: npm install -g node-gyp

            - name: Install dependencies
              run: npm install

            - name: Install dmg-license
              run: npm i dmg-license

            - name: Build app
              run: npm run build

            - name: Build and release app
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_LINK: ${{ secrets.CSC_LINK }}
                  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLEID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLEIDPASS }}
                  APPLE_TEAM_ID: ${{ secrets.APPLETEAMID }}
              run: |
                  if [ -n "${CSC_LINK}" ] && [ -n "${CSC_KEY_PASSWORD}" ] && [ -n "${APPLE_ID}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
                    npm run release
                  else
                    npm run release:internal
                  fi
              shell: bash

    update_release_notes:
        name: "Update Release Notes"
        runs-on: blacksmith-4vcpu-ubuntu-2404
        needs: [publish_windows, publish_mac]
        if: always() && (needs.publish_windows.result == 'success' || needs.publish_mac.result == 'success')
        permissions:
            contents: write

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Get version from package.json
              id: version
              run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

            - name: Update release body
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  APP_VERSION: ${{ steps.version.outputs.version }}
              run: |
                  cat > /tmp/release-body.md <<BODY
                  ## FreeShow - CCFII Edition v${APP_VERSION}

                  ### Download

                  | Platform | File |
                  |---|---|
                  | **Windows** | \`FreeShow-CCFII-${APP_VERSION}-x64.exe\` |
                  | **macOS (Apple Silicon)** | \`FreeShow-CCFII-${APP_VERSION}-arm64.dmg\` |
                  | **macOS (Intel)** | \`FreeShow-CCFII-${APP_VERSION}-x64.dmg\` |

                  ### Installation

                  **Windows:** Run the \`.exe\` installer. If Windows SmartScreen appears, click "More info" then "Run anyway."

                  **macOS:** Open the \`.dmg\`, drag the app to Applications. On first launch, right-click the app and select "Open" to bypass Gatekeeper.

                  ### Updating from a previous version

                  **Windows:** Download and run the new installer — it replaces the old version automatically. Your shows and settings are preserved.

                  **macOS:** Download the new \`.dmg\` and drag the app to Applications, replacing the old one. Your shows and settings are preserved (stored in \`~/Library/Application Support/freeshow/\`).

                  ### How to check your version

                  In the app: **Help > About** or check the startup screen below "CCFII Edition."
                  BODY

                  gh release edit "v${APP_VERSION}" --draft=false --notes-file /tmp/release-body.md 2>/dev/null || echo "Release v${APP_VERSION} not found or already updated"
