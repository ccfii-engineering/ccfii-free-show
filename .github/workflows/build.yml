name: Build
on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                include:
                    - os: blacksmith-4vcpu-windows-2025
                      artifact_name: freeshow-windows-bundle
                    - os: macos-latest
                      artifact_name: freeshow-macos-bundle
                    - os: ubuntu-latest
                      artifact_name: freeshow-linux-bundle

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Install Node.js and NPM
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm install

            - name: Install Linux libraries
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev --fix-missing

            - name: Install Python 3.11
              if: runner.os == 'macOS'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install node-gyp
              if: runner.os == 'macOS'
              run: npm install -g node-gyp

            - name: Install dmg-license
              if: runner.os == 'macOS'
              run: npm i dmg-license

            - name: Bundle internal app
              run: npm run dist:internal

            - name: Upload bundled artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*
                  if-no-files-found: error
