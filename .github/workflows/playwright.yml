name: Playwright Tests
on:
    # turning off temporarily as it does not work properly!
    # Error: electron.launch: Process failed to launch!
    # push:
    #     branches: [dev]
    # pull_request:
    #     branches: [dev]
    workflow_dispatch:

jobs:
    test:
        timeout-minutes: 60
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@v4
            - uses: useblacksmith/setup-node@v5
              with:
                  node-version: 20
                  cache: "npm"
            - name: Install libraries
              run: sudo apt-get install libfontconfig1-dev
            - name: Install dependencies
              run: npm install
            - name: Cache Playwright browsers
              uses: useblacksmith/cache@v5
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      playwright-${{ runner.os }}-
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Build
              run: npm run build
            - name: Run Playwright tests
              run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run test:playwright
            #   if: matrix.os == 'ubuntu-latest'
            # - run: npm run test
            #   if: matrix.os != 'ubuntu-latest'
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-output
                  path: test-output/
                  retention-days: 30
