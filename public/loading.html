<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FreeShow - CCFII Edition</title>

        <style>
            :root {
                --radius: 5px;
                --loader-height: 3px;
                --crimson: #810e0e;
                --amber: #faa739;
                --bg-dark: #0a0505;
                --bg-surface: #1e1414;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
                color: #f0f0ff;
                width: 100%;
                height: 100vh;
                overflow: hidden;
            }

            main {
                background: linear-gradient(140deg, var(--bg-surface) 20%, var(--bg-dark));
                width: 100%;
                height: 100%;
                border-radius: var(--radius);

                display: flex;
                flex-direction: column;
                gap: 6px;
                justify-content: center;
                align-items: center;
                -webkit-app-region: drag;

                overflow: hidden;
            }

            .logo {
                height: 120px;
                width: 120px;
                object-fit: contain;
                filter: drop-shadow(0 0 12px rgba(250, 167, 57, 0.4));
            }

            .title {
                font-size: 1.6em;
                font-weight: bold;
                color: #f0f0ff;
                margin-top: 4px;
            }

            .edition {
                font-size: 0.75em;
                font-weight: 600;
                color: var(--amber);
                text-transform: uppercase;
                letter-spacing: 3px;
            }

            .v {
                opacity: 0.3;
                font-size: 0.8em;
                margin-top: 2px;
            }

            .loader {
                --margin: 1.5px;
                background-color: var(--bg-surface);
                margin: 0 var(--margin);
                border-top-left-radius: 40px;
                border-top-right-radius: 40px;

                position: absolute;
                top: 0;
                width: calc(100% - (var(--margin) * 2));
                height: var(--loader-height);

                overflow: hidden;
            }

            .loader span:before {
                content: "";
                position: absolute;
                height: 100%;
                background-color: var(--crimson);
                animation: first 1.8s infinite ease-out;
            }

            .loader span:after {
                content: "";
                position: absolute;
                height: 100%;
                background-color: var(--amber);
                animation: second 1.8s infinite ease-in;
            }

            @keyframes first {
                0% {
                    inset-inline-start: -100%;
                    width: 80%;
                }
                100% {
                    inset-inline-start: 100%;
                    width: 20%;
                }
            }

            @keyframes second {
                0% {
                    inset-inline-start: -150%;
                    width: 80%;
                }
                100% {
                    inset-inline-start: 100%;
                    width: 20%;
                }
            }
        </style>
    </head>
    <body>
        <div class="loader">
            <span></span>
        </div>

        <main>
            <img class="logo" src="./ccfii-logo.png" alt="CCFII" draggable="false" />

            <div class="title">FreeShow</div>
            <div class="edition">CCFII Edition</div>
            <p class="v">v<span class="version">0.0.0</span></p>
        </main>

        <script>
            const { ipcRenderer } = require("electron")

            ipcRenderer.send("MAIN", { channel: "VERSION" })
            ipcRenderer.once("MAIN", (e, msg) => {
                if (msg.channel !== "VERSION" || !msg.data) return
                document.querySelector(".version").innerHTML = msg.data
            })
        </script>
    </body>
</html>
